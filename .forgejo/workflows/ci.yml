# Caller stub (Flame pull-CI, bun-star) — logic lives in foundry/foundry-stocks;
# invariant. Retires the ci.tf bun-star pour (CI Plane Hardening F2).
#
# A bun star's gate IS the frontend gate, reused verbatim (the bun-server-leaf
# precedent): `bun install --frozen-lockfile && bun run gate` + bun audit + opengrep is
# exactly the gate a bun star needs, so don't fork a near-identical one.
name: ci
on:
  pull_request:
    paths-ignore:
      - "infra/**"
      - ".forgejo/**"
      - "**.md"
jobs:
  ci:
    uses: foundry/foundry-stocks/.forgejo/workflows/frontend-ci.yml@main
    # pragma comment: detect-secrets flags the word 'secrets' as a Secret Keyword,
    # and `secrets: inherit` is the reusable-workflow idiom, not a credential.
    secrets: inherit  # pragma: allowlist secret

# MANAGED BY FOUNDRY (infra/ci.tf, Smaller Hammers F5/F6) — do not hand-edit.
# Central definition: foundry/infra/ci-templates/build.yml (re-sourced from the
# furnace ci-build-deploy pour generation: OCI labels, sha-pin, tier-1 base).
# A hand edit is drift; the next core apply restores this file.
#
# deploy.yml — build, sha-pin, sign, publish, poured per-star by furnace (composed
# from the ci-build-deploy block). A top-level workflow on: push to main (branch-gated,
# so a feature-branch push never fires a hollow no-op) — re-runs the gate, then builds,
# labels, sha-tags, Trivy-scans, pushes + cosign-signs the image. The container
# LIFECYCLE stays Tofu-managed (foundry); CI only publishes the image. Secrets
# (REGISTRY_TOKEN / COSIGN_* / DATABASE_URL) are the star's own repo secrets. A
# non-deploying SDD repo drops this file via a per-consumer override. Retires the
# copied per-repo deploy.yml.

name: build

on:
  push:
    branches: [main]
    # Only CODE changes rebuild the image. A CI-file re-pour (.forgejo/**) or a
    # deploy-spec change (infra/**, deploy.yml's domain) must NOT trigger a rebuild —
    # that flooded the 2 runners on a fleet-wide ci.tf pour (18 needless builds).
    paths-ignore:
      - "**.md"
      - ".forgejo/**"
      - "infra/**"

jobs:
  build:
    name: Build, sha-pin, sign, publish
    # Its own workflow (deploy.yml, on: push: branches:[main]) — the trigger branch-gates
    # it, so it only ever fires on a push to main. No event conditional needed.
    runs-on: nas01
    defaults:
      run:
        shell: bash
    container:
      # forge-ci = the constellation CI toolchain baked once (bases/ci-runner/,
      # forged + cosign-signed by build-base.yml): uv, cosign, oras, syft, opengrep,
      # conftest, tofu, jq. No build step curls GitHub/astral (those installers
      # 429-flaked star CI). cosign/oras are built from source (trivy-clean).
      image: forgejo.notusmi.com/rob/forge-ci:latest
      options: --network host
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    steps:
      - uses: https://github.com/actions/checkout@v4

      - name: Load tool versions
        run: grep -E '^[A-Z_]+=' .forgejo/versions.env >> "$GITHUB_ENV"

      # uv / bun / opengrep / cosign / syft are baked into the ci-runner image
      # from the local Forgejo mirror — no per-build installers (no GitHub/astral
      # 429). The Gate is LANGUAGE-DETECTED: a bun star (package.json + bun.lock)
      # runs the bun gate; every other repo keeps the python (uv) gate byte-for-
      # byte, so a re-pour leaves python stars behaviourally unchanged.

      - name: Gate — lint / type / test (deploy only on green)
        run: |
          if [ -f package.json ] && [ -f bun.lock ]; then
            bun install --frozen-lockfile
            bun run format:check
            bun run lint
            bun run typecheck
            bun run test
          else
            uv sync --all-extras --locked
            uv run pre-commit run --all-files --show-diff-on-failure
            uv run mypy src tests
            uv run pyright
            uv run pytest -q
          fi

      - name: Dependency vuln scan
        run: |
          if [ -f package.json ] && [ -f bun.lock ]; then
            bun audit --audit-level=high
          else
            uv run --with pip-audit pip-audit
          fi

      - name: SAST (opengrep, scoped taint rules)
        # opengrep is baked into the ci-runner image (from the Forgejo mirror) —
        # no per-build install, no GitHub rate-limit flake.
        run: |
          export LANG=C.UTF-8 LC_ALL=C.UTF-8
          opengrep scan --config rules/sast --error .

      - name: Publish (sha-pinned) + sign + SBOM
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Continuous-monitoring plane (replaces the retired build-time Trivy gate).
          # Absent on a star until provisioned -> the upload self-skips (see below).
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
        run: |
          set -euo pipefail
          # cosign + syft are baked into the ci-runner image (Forgejo mirror).
          echo "${REGISTRY_TOKEN}" | docker login forgejo.notusmi.com -u rob --password-stdin
          # Compose-OPTIONAL build (Smaller Hammers decentralization): a decentralized
          # star's runtime source of truth is infra/terraform.tfvars, not compose, so it
          # carries NO compose file. When one is present, use it — it may encode an image
          # name a bare build can't derive (e.g. calliope-mcp, not the repo name) or
          # build-time args; when absent, the image is the fleet-invariant
          # forgejo.notusmi.com/rob/<repo>:latest and the context is '.'.
          # Robust under `set -euo pipefail`: a glob-loop (never `ls` a missing file,
          # which exits 2 → pipefail → the step dies before the build).
          CF=""
          for f in compose.yaml compose.yml docker-compose.yml; do [ -f "$f" ] && { CF=$f; break; }; done
          if [ -n "$CF" ]; then
            # `docker compose build`/`config` interpolate the WHOLE compose file, incl.
            # runtime-only vars (a db service's `${STAR_DB_PASSWORD:?...}`). A build needs
            # no runtime secret, so satisfy interpolation with a throwaway dummy .env —
            # real secrets in the step env still win (shell env > .env file). `|| true`
            # so a compose with no ${VAR} refs (grep exits 1) doesn't fail the step.
            grep -ohE '\$\{[A-Za-z_][A-Za-z0-9_]*' "$CF" \
              | sed 's/^\${//' | sort -u | sed 's/$/=ci-build-dummy/' > .env || true
            docker compose build
            IMG=$(docker compose config --images | grep '^forgejo.notusmi.com/' | head -1)
          else
            IMG="forgejo.notusmi.com/rob/${GITHUB_REPOSITORY##*/}:latest"
            docker build --network=host -t "$IMG" .
          fi
          # Stamp standard OCI provenance labels (a labels-only layer). Without a
          # tagged, labelled image the registry blob-GC reaps untagged manifests and
          # any @sha256 pin dangles (the 2026-07-02 chaos/clio/nyx/terpsichore incident).
          # revision ties the image back to its commit; the sha-tag below keeps it tagged.
          CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SRC="${GITHUB_SERVER_URL:-https://forgejo.notusmi.com}/${GITHUB_REPOSITORY}"
          echo "FROM $IMG" | docker build -t "$IMG" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.created=${CREATED}" \
            --label "org.opencontainers.image.source=${SRC}" \
            --label "org.opencontainers.image.version=${GITHUB_SHA:0:12}" \
            --label "org.opencontainers.image.title=${GITHUB_REPOSITORY##*/}" \
            --label "org.opencontainers.image.url=${SRC}" \
            -
          # Per-build full-image Trivy scan RETIRED (CI cost + hygiene pass): the base
          # is scanned + weekly-rescanned at base-build; app python deps already gate via
          # pip-audit above; the SBOM below feeds Dependency-Track for continuous
          # monitoring (the post-publish green->red window a one-shot build scan can't
          # cover); Renovate keeps deps current. See the PR for the coverage-vs-cost
          # rationale. Trivy was the CI CPU/IO hog — this is the sustained-cost fix.
          # sha-pin (Decision #12): tag {name}:<short-sha> alongside :latest, push both.
          SHA_TAG="${IMG%:*}:${GITHUB_SHA:0:12}"
          docker tag "$IMG" "$SHA_TAG"
          # Push :latest by ref (compose-independent — `docker compose push` needs a
          # compose file; `docker push "$IMG"` is the same push and works either way).
          docker push "$IMG"
          docker push "$SHA_TAG"
          DIGEST=$(docker inspect --format='{{range .RepoDigests}}{{println .}}{{end}}' "$IMG" | grep '^forgejo.notusmi.com/' | head -1)
          test -n "$DIGEST"
          printf '%s' "${COSIGN_PRIVATE_KEY}" | base64 -d > /tmp/cosign.key
          trap 'rm -f /tmp/cosign.key' EXIT
          cosign sign --key /tmp/cosign.key --yes "$DIGEST"
          syft "$IMG" -o cyclonedx-json > /tmp/sbom.cdx.json
          cosign attest --key /tmp/cosign.key --type cyclonedx --predicate /tmp/sbom.cdx.json --yes "$DIGEST"
          cosign verify --key cosign.pub "$DIGEST"
          # Continuous vuln monitoring (replaces the retired build-time Trivy gate): push
          # the SBOM to Dependency-Track, which re-evaluates it against new advisories with
          # no rebuild. Non-fatal + self-skips until DTRACK_API_KEY is provisioned on the
          # star repo (a follow-up; frontends already carry it).
          if [ -n "${DTRACK_API_KEY:-}" ]; then
            PROJ="${IMG##*/}"; PROJ="${PROJ%:*}"
            printf '{"projectName":"%s","projectVersion":"latest","autoCreate":true,"bom":"%s"}' "$PROJ" "$(base64 -w0 /tmp/sbom.cdx.json)" > /tmp/dt-bom.json
            docker run --rm -i --network host curlimages/curl:latest -s -X PUT http://127.0.0.1:30181/api/v1/bom -H "Content-Type: application/json" -H "X-Api-Key: ${DTRACK_API_KEY}" --data-binary @- -o /dev/null -w 'DT upload HTTP %{http_code}\n' < /tmp/dt-bom.json || echo "DT upload failed (non-fatal)"
          else
            echo "DTRACK_API_KEY unset — skipping Dependency-Track upload (provision it to enable monitoring)"
          fi
          # The digest is the deploy's pin target -- hephaestus/infra references @sha256:...
          echo "DEPLOY_DIGEST=$DIGEST" | tee /tmp/deploy-digest
          docker logout forgejo.notusmi.com

      - name: Open a deploy PR — auto-bump the image pin (decentralized stars)
        # The digest just built + signed + SBOM-attested IS the deploy's pin. Instead
        # of a human re-deriving the bump each session, write it as a machine-owned
        # auto-tfvars on a deploy branch and open a PR — deploy.yml's plan-on-PR
        # (paths: infra/**) is the review gate, merge applies. tofu auto-loads
        # *.auto.tfvars.json and it OVERRIDES terraform.tfvars, so the operator's spec
        # stays sovereign and the digest is clearly build-owned data (mirrors
        # secrets.auto.tfvars.json). PR-gated by design — never pushes to main.
        # Skipped for a repo with no infra/ (a non-deploying SDD star). Uses the
        # contents API (like forgejo-put-file), not git, to sidestep the checkout
        # auth-header dance; DEPLOY_TOKEN is a real PAT so the PR fires deploy.yml
        # (a push made with the Actions token would be event-suppressed).
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          [ -d infra ] || { echo "no infra/ — not a decentralized deploy star; skipping pin-bump"; exit 0; }
          DIGEST=$(sed -n 's/^DEPLOY_DIGEST=//p' /tmp/deploy-digest)
          test -n "$DIGEST"
          REPO="${GITHUB_REPOSITORY##*/}"
          SHORT="${GITHUB_SHA:0:12}"
          BRANCH="deploy/${SHORT}"
          AUTH="Authorization: token ${DEPLOY_TOKEN}"
          APIREPO="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}"
          # Re-run guard: the same commit already opened its bump PR.
          if [ "$(curl -sS -o /dev/null -w '%{http_code}' -H "$AUTH" "${APIREPO}/branches/${BRANCH}")" = "200" ]; then
            echo "deploy branch ${BRANCH} already exists — pin-bump already opened; skipping"
            exit 0
          fi
          FILE_API="${APIREPO}/contents/infra/image.auto.tfvars.json"
          CONTENT_B64=$(jq -n --arg img "$DIGEST" '{image: $img}' | base64 -w0)
          MSG="deploy(${REPO}): pin image @ ${SHORT}"
          # Create-or-update on a NEW deploy branch (contents API cuts new_branch from
          # main); a prior deploy left the file on main -> update needs its sha.
          SHA=$(curl -sS -H "$AUTH" "${FILE_API}?ref=main" | jq -r '.sha // ""')
          if [ -n "$SHA" ]; then
            METHOD=PUT
            BODY=$(jq -n --arg c "$CONTENT_B64" --arg m "$MSG" --arg s "$SHA" --arg nb "$BRANCH" \
              '{content:$c, message:$m, sha:$s, branch:"main", new_branch:$nb}')
          else
            METHOD=POST
            BODY=$(jq -n --arg c "$CONTENT_B64" --arg m "$MSG" --arg nb "$BRANCH" \
              '{content:$c, message:$m, branch:"main", new_branch:$nb}')
          fi
          wcode=$(printf '%s' "$BODY" | curl -sS -o /dev/null -w '%{http_code}' \
            -X "$METHOD" -H "$AUTH" -H "Content-Type: application/json" --data-binary @- "$FILE_API")
          case "$wcode" in 200 | 201) : ;; *) echo "pin-bump write HTTP $wcode" >&2; exit 1 ;; esac
          # Open the deploy PR (a real PAT -> deploy.yml's pull_request trigger fires).
          PRBODY="Auto-bump the image pin to the digest just built, signed, and SBOM-attested. Merging applies — deploy.yml posts the plan on this PR. Digest: ${DIGEST}"
          jq -n --arg h "$BRANCH" --arg t "$MSG" --arg b "$PRBODY" \
             '{head: $h, base: "main", title: $t, body: $b}' \
          | curl -sS -X POST "${APIREPO}/pulls" \
             -H "$AUTH" -H "Content-Type: application/json" \
             --data-binary @- -o /dev/null -w 'deploy PR HTTP %{http_code}\n'

# Caller stub (Flame pull-CI) — logic in foundry/foundry-stocks; invariant, copier-shipped.
#
# build.yml is LANGUAGE-AGNOSTIC (it runs `docker build .`; the Dockerfile does the language
# work), so a go star calls exactly the same reusable build every python/rust/bun star does.
#
# enable-openid-connect at WORKFLOW level (and on the uses: job): the build's pin-bump
# resolves a write-capable token from Calypso /fleet over Forgejo-OIDC. Forgejo silently
# ignores a job-level-only declaration anywhere in the reusable path — the run then gets no
# ACTIONS_ID_TOKEN_REQUEST_* and the zero-credential path dies.
name: build

enable-openid-connect: true

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".forgejo/**"
      - "infra/**"
jobs:
  build:
    enable-openid-connect: true
    uses: foundry/foundry-stocks/.forgejo/workflows/build.yml@main
    secrets: inherit  # pragma: allowlist secret

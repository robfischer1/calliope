# MANAGED BY FOUNDRY (infra/ci.tf, Smaller Hammers F5) — do not hand-edit.
# Central definition: foundry/infra/ci-templates/deploy.yml. A hand edit is
# drift; the next core apply restores this file.
#
# Forgejo Actions: the GitOps DEPLOY pipeline (constellation star).
# deploy = tofu over this repo's own /infra against its ISOLATED state
# (pg backend, schema_name = this repo — Smaller Hammers F1):
#
#   * PR touching infra/**   -> tofu plan, posted into the PR as a comment
#     (the reviewable plan is the merge gate: merge-if-clean).
#   * merge to main          -> tofu apply (the reviewed plan is the approval).
#
# Wiring inputs come from the TELESCOPE fleet contract (Smaller Hammers F3):
# the signed epoch artifact is pulled + cosign-verified, then materialized as
# infra/fleet.json for the repo's /infra to read. No repo reads the core state.
#
# tofu runs as the PINNED binary installed into this ephemeral job container —
# the "no local tofu on any host" convention is about hosts; a -v bind of the
# checkout into an opentofu container resolves against the HOST daemon's fs
# (the job runs in a container), so the binary-in-job is the working form.
#
# REQUIRED Forgejo Actions secrets:
#   PG_CONN_STR     postgres://forge:...@<tailnet>:5432/tofu?sslmode=disable
#                   (the shared state backend; the schema is per-repo).
#   DEPLOY_TOKEN    a Forgejo PAT — posts the plan comment; pulls the telescope
#                   artifact; authenticates the module fetch. (FORGEJO_* is a
#                   RESERVED Actions-secret prefix — hence the name.)
# The telescope epoch pin + tool versions are central: bumping them here rolls
# the whole enrolled fleet through drift-managed materialization.

name: deploy
on:
  pull_request:
    paths: ["infra/**"]
  push:
    branches: [main]
    paths: ["infra/**"]

# Serialize deploys per repo: a tofu apply that REPLACES a container (a new image
# digest) must never race a concurrent apply on the same isolated pg state
# (schema=repo) — the same race that destroyed charon 3x during the F12 frontend
# cutover (mirrors frontend/deploy.yml, foundry #151). The F14 re-pour makes this
# load-bearing for stars too: the core apply commits main.tf then prunes 4 files —
# several infra/** pushes that would otherwise fire overlapping applies. Queue,
# don't cancel: cancelling a mid-flight apply strands the tofu state lock.
concurrency:
  group: star-deploy-${{ github.repository }}
  cancel-in-progress: false

env:
  TELESCOPE_EPOCH: epoch-5
  ORAS_VERSION: "1.2.0"
  COSIGN_VERSION: "v3.0.2"
  TOFU_VERSION: "1.10.3"

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: nas01
    container:
      # python-ci: tofu/oras/cosign + uv/opengrep/syft/conftest baked once
      # (bases/python-ci/, cosign-signed by build-base) — no per-run GitHub installers.
      image: forgejo.notusmi.com/rob/stellar_core:python-ci
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    defaults:
      run:
        shell: bash
    steps:
      - uses: https://github.com/actions/checkout@v4

      # tofu / oras / cosign are baked into the python-ci image from the local
      # Forgejo mirror — no per-run GitHub-release installers (429-flaky).

      - name: Authenticate the module fetch (foundry star module, private origin)
        env:
          FORGEJO_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config --global "http.https://forgejo.notusmi.com.extraheader" "Authorization: token ${FORGEJO_TOKEN}"

      - name: Fetch + verify the fleet contract (telescope)
        env:
          FORGEJO_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          echo "${FORGEJO_TOKEN}" | oras login forgejo.notusmi.com -u rob --password-stdin
          cosign verify --key cosign.pub --insecure-ignore-tlog "forgejo.notusmi.com/rob/telescope:${TELESCOPE_EPOCH}"
          mkdir -p /tmp/fleet && oras pull -o /tmp/fleet "forgejo.notusmi.com/rob/telescope:${TELESCOPE_EPOCH}"
          cp /tmp/fleet/roster.json infra/fleet.json

      - name: tofu plan (isolated state, schema = repo)
        env:
          PG_CONN_STR: ${{ secrets.PG_CONN_STR }}
          # Deploy targets NAS01's docker via the crossover socket-proxy
          # (10.10.10.1:2375, nas01<->llm01 DAC /30). The runner moved to llm01, so its
          # LOCAL sock is the wrong daemon — that caused the wrong-daemon deploys.
          TF_VAR_docker_host: tcp://10.10.10.1:2375
          # A sovereign-DB star sets TF_VAR_SECRETS (a JSON map, e.g.
          # {"FOO_DB_PASSWORD":"..."}) so its postgres co-container's password
          # resolves; a Pistis-only star leaves it unset -> {} (var.secrets default).
          SECRETS_JSON: ${{ secrets.TF_VAR_SECRETS }}
        run: |
          set -euo pipefail
          # The secrets map rides a JSON repo secret; materialize it as a JSON
          # auto-tfvars (tofu parses *.auto.tfvars.json natively — TF_VAR_secrets
          # would parse the JSON as HCL and choke on the ':'). jq wraps + validates
          # it; {} when the star sets none. (NOT `${VAR:-{}}` — that brace collides
          # with the expansion's close and appends a stray '}'.)
          SJSON="${SECRETS_JSON:-}"; [ -n "$SJSON" ] || SJSON='{}'
          jq -n --argjson s "$SJSON" '{secrets: $s}' > infra/secrets.auto.tfvars.json
          REPO="${GITHUB_REPOSITORY##*/}"
          tofu -chdir=infra init -input=false \
            -backend-config="conn_str=${PG_CONN_STR}" \
            -backend-config="schema_name=${REPO}"
          set +e
          tofu -chdir=infra plan -input=false -no-color -detailed-exitcode \
            -out=plan.tfplan | tee /tmp/plan.txt
          rc=${PIPESTATUS[0]}
          set -e
          # 0 = no changes, 2 = changes to apply; anything else is a real error.
          if [ "$rc" != "0" ] && [ "$rc" != "2" ]; then exit "$rc"; fi
          echo "$rc" > /tmp/plan.rc

      - name: Post the plan into the PR
        env:
          FORGEJO_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          rc=$(cat /tmp/plan.rc)
          status="no changes (clean)"
          [ "$rc" = "2" ] && status="CHANGES pending apply-on-merge"
          { echo "### tofu plan — ${status}"
            echo '```'
            tail -c 60000 /tmp/plan.txt
            echo '```'
          } > /tmp/comment.md
          jq -n --rawfile body /tmp/comment.md '{body: $body}' | curl -sS -X POST \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/${{ github.event.number }}/comments" \
            -H "Authorization: token ${FORGEJO_TOKEN}" -H "Content-Type: application/json" \
            --data-binary @- -o /dev/null -w 'plan comment HTTP %{http_code}\n'

  apply:
    if: github.event_name == 'push'
    runs-on: nas01
    container:
      # python-ci: tofu/oras/cosign + uv/opengrep/syft/conftest baked once
      # (bases/python-ci/, cosign-signed by build-base) — no per-run GitHub installers.
      image: forgejo.notusmi.com/rob/stellar_core:python-ci
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    defaults:
      run:
        shell: bash
    steps:
      - uses: https://github.com/actions/checkout@v4

      # tofu / oras / cosign are baked into the python-ci image from the local
      # Forgejo mirror — no per-run GitHub-release installers (429-flaky).

      - name: Authenticate the module fetch (foundry star module, private origin)
        env:
          FORGEJO_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config --global "http.https://forgejo.notusmi.com.extraheader" "Authorization: token ${FORGEJO_TOKEN}"

      - name: Fetch + verify the fleet contract (telescope)
        env:
          FORGEJO_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          echo "${FORGEJO_TOKEN}" | oras login forgejo.notusmi.com -u rob --password-stdin
          cosign verify --key cosign.pub --insecure-ignore-tlog "forgejo.notusmi.com/rob/telescope:${TELESCOPE_EPOCH}"
          mkdir -p /tmp/fleet && oras pull -o /tmp/fleet "forgejo.notusmi.com/rob/telescope:${TELESCOPE_EPOCH}"
          cp /tmp/fleet/roster.json infra/fleet.json

      - name: tofu apply (the reviewed plan is the approval)
        env:
          PG_CONN_STR: ${{ secrets.PG_CONN_STR }}
          # Deploy targets NAS01's docker via the crossover socket-proxy
          # (10.10.10.1:2375, nas01<->llm01 DAC /30). The runner moved to llm01, so its
          # LOCAL sock is the wrong daemon — that caused the wrong-daemon deploys.
          TF_VAR_docker_host: tcp://10.10.10.1:2375
          # See the plan step: a sovereign-DB star's password rides TF_VAR_SECRETS.
          SECRETS_JSON: ${{ secrets.TF_VAR_SECRETS }}
        run: |
          set -euo pipefail
          # The secrets map rides a JSON repo secret; materialize it as a JSON
          # auto-tfvars (tofu parses *.auto.tfvars.json natively — TF_VAR_secrets
          # would parse the JSON as HCL and choke on the ':'). jq wraps + validates
          # it; {} when the star sets none. (NOT `${VAR:-{}}` — that brace collides
          # with the expansion's close and appends a stray '}'.)
          SJSON="${SECRETS_JSON:-}"; [ -n "$SJSON" ] || SJSON='{}'
          jq -n --argjson s "$SJSON" '{secrets: $s}' > infra/secrets.auto.tfvars.json
          REPO="${GITHUB_REPOSITORY##*/}"
          tofu -chdir=infra init -input=false \
            -backend-config="conn_str=${PG_CONN_STR}" \
            -backend-config="schema_name=${REPO}"
          tofu -chdir=infra apply -input=false -auto-approve -no-color

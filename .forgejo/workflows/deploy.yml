# Forgejo Actions: build + deploy calliope-mcp on push to main.
# Runs on the nas01 self-hosted runner (label `nas01`) with the host docker
# socket mounted, so `docker compose` targets nas01's own daemon and recreates
# the container from source.
#
# calliope-mcp is the constellation's prose-facet star — a Node/pnpm MCP server
# fronted east-west by the Hades gateway (http://calliope-mcp:8204/mcp). It
# builds from public npm deps; no private schema, no DB, no private-repo auth.
# It reaches urania over mnemosyne-net (URANIA_URL, baked in compose.yaml).
#
# SECURITY GATE (#1471): the deploy gate also runs pnpm audit (blocking), opengrep
# (vendored TS taint ruleset, a BLOCKING gate), and a Trivy scan of the freshly
# built image (blocking, --ignore-unfixed) before publish.
#
# REQUIRED Forgejo Actions secret (repo -> Settings -> Actions -> Secrets):
#   REGISTRY_TOKEN  a Forgejo PAT (write:package) -- `docker login` + push the
#                   built image to forgejo.notusmi.com/rob/calliope-mcp.
#
# Prereqs: Forgejo Actions enabled on this repo + a runner with the `nas01`
# label (host-networked, /var/run/docker.sock allowed); the mnemosyne-net
# external network present on the host. Adding calliope to the constellation is
# one line in the gateway's hades.toml [stars] table + a Hades restart.

name: deploy
on:
  push:
    branches: [main]
    # Docs-only pushes don't change the image — skip the rebuild + redeploy.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"

jobs:
  build-and-deploy:
    runs-on: nas01
    container:
      image: catthehacker/ubuntu:act-22.04   # glibc + docker CLI + compose v2
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
    steps:
      - uses: https://github.com/actions/checkout@v4

      # setup-node MUST precede pnpm/action-setup: pnpm 11's engines need Node
      # >=22.13, and the runner default is older.
      - name: Set up Node
        uses: https://github.com/actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: https://github.com/pnpm/action-setup@v4
        with:
          standalone: true   # bundles its own runtime; the runner's Node is too old

      # Gate: format / lint / type / test / build. Deploy only on green.
      - name: Gate — format / lint / typecheck / test / build
        run: |
          pnpm install --frozen-lockfile
          pnpm format:check
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      # pnpm audit BLOCKS on a HIGH+ production dependency advisory.
      - name: Dependency vuln scan (pnpm audit)
        run: pnpm audit --prod --audit-level=high

      # opengrep runs the vendored TS taint ruleset (rules/sast), a BLOCKING gate
      # while tuned. LANG forces UTF-8: opengrep reads files under the C locale
      # otherwise and dies on any non-ASCII byte.
      - name: SAST (opengrep, scoped taint rules)
        run: |
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
          export PATH="$HOME/.opengrep/cli/latest:$PATH"
          export LANG=C.UTF-8 LC_ALL=C.UTF-8
          opengrep scan --config rules/sast --error .

      # Build the image FRESH (--no-cache so Trivy scans a deterministic image
      # from the current lockfile, never a stale cached layer), scan it, then
      # publish + deploy. Trivy BLOCKS on a fixable HIGH/CRITICAL; --ignore-unfixed
      # drops base-image CVEs with no released fix.
      - name: Build image
        run: docker compose build --no-cache calliope-mcp

      - name: Image CVE scan (Trivy)
        run: |
          IMG=$(docker compose config --images | grep calliope-mcp)
          echo "scanning image: $IMG"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress \
            "$IMG"

      # Publish the built image to the Forgejo container registry, then deploy.
      # `docker compose push` publishes forgejo.notusmi.com/rob/calliope-mcp:latest.
      - name: Publish to Forgejo registry + deploy on nas01
        shell: bash   # the act runner defaults to dash (no pipefail)
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          CALLIOPE_DB_PASSWORD: ${{ secrets.CALLIOPE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          # Fail fast: an unset password would make compose ship the literal
          # ${CALLIOPE_DB_PASSWORD} as the real credential (the tethys rake).
          test -n "${CALLIOPE_DB_PASSWORD}" || { echo "CALLIOPE_DB_PASSWORD secret is unset"; exit 1; }
          echo "${REGISTRY_TOKEN}" | docker login forgejo.notusmi.com -u rob --password-stdin
          IMG=$(docker compose config --images | grep calliope-mcp)
          docker push "$IMG"
          echo "$IMG" > /tmp/built-image
          docker compose up -d

      # Supply-chain (#1470 ph2): sign the published image with the constellation
      # cosign key + attach a CycloneDX SBOM attestation, then verify with the
      # committed public key (cosign.pub). Runs AFTER deploy so a signing hiccup
      # can't block the rollout; a failure here still reds the run. cosign/syft
      # aren't on the runner image -> fetch them. COSIGN_PRIVATE_KEY (base64,
      # single-line) + COSIGN_PASSWORD are bws-sourced repo Actions secrets; the
      # publish step's docker login persists here (same job container).
      - name: Sign image + attest SBOM (cosign)
        shell: bash
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
        run: |
          set -euo pipefail
          curl -sSL -o /usr/local/bin/cosign https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64
          chmod +x /usr/local/bin/cosign
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin >/dev/null
          IMG=$(cat /tmp/built-image)
          DIGEST=$(docker inspect --format='{{range .RepoDigests}}{{println .}}{{end}}' "$IMG" | grep '^forgejo.notusmi.com/' | head -1)
          test -n "$DIGEST"
          echo "signing $DIGEST"
          printf '%s' "${COSIGN_PRIVATE_KEY}" | base64 -d > /tmp/cosign.key
          trap 'rm -f /tmp/cosign.key' EXIT
          cosign sign   --key /tmp/cosign.key --yes "$DIGEST"
          syft "$IMG" -o cyclonedx-json > /tmp/sbom.cdx.json
          cosign attest --key /tmp/cosign.key --type cyclonedx --predicate /tmp/sbom.cdx.json --yes "$DIGEST"
          cosign verify --key cosign.pub "$DIGEST"

          # Upload the SBOM to Dependency-Track for continuous CVE tracking of
          # shipped artifacts. DT binds 127.0.0.1 on the host, so reach it via a
          # host-networked curl sidecar fed the payload over stdin. Non-fatal --
          # DT is telemetry, not a deploy gate. autoCreate makes the project on
          # first upload (the Containers-team key has PROJECT_CREATION_UPLOAD).
          PROJ_NAME=${IMG##*/}; PROJ_NAME=${PROJ_NAME%%:*}
          printf '{"projectName":"%s","projectVersion":"latest","autoCreate":true,"bom":"%s"}' "$PROJ_NAME" "$(base64 -w0 /tmp/sbom.cdx.json)" > /tmp/dt-bom.json
          docker run --rm -i --network host curlimages/curl:latest -s -X PUT http://127.0.0.1:30181/api/v1/bom -H "Content-Type: application/json" -H "X-Api-Key: ${DTRACK_API_KEY}" --data-binary @- -o /dev/null -w 'DT upload HTTP %{http_code}\n' < /tmp/dt-bom.json || echo "DT upload failed (non-fatal)"

          docker logout forgejo.notusmi.com
